    --bg: #0a0c10;
    --surface: #0f1218;
    --surface2: #161b24;
    --border: #1e2530;

    --accent2: #ff4081;
    --accent3: #69ff47;
    --accent4: #ffd740;
    --text: #c9d1d9;
    --text-dim: #586069;
    --text-bright: #e6edf3;

    --tag-wiki: #1a3a4a;
    --tag-wiki-t: #00e5ff;
    --tag-blue: #0d2e1a;
    --tag-blue-t: #69ff47;
    --tag-red: #2e0d1a;
    --tag-red-t: #ff4081;
    --tag-hunt: #2e2200;
    --tag-hunt-t: #ffd740;
    --tag-forensics: #1a1040;
    --tag-forensics-t: #b388ff;
    --tag-linux: #1a2e00;
    --tag-linux-t: #76ff03;
    --tag-windows: #002e2e;
    --tag-windows-t: #00e5ff;
    --tag-intel: #2e1a00;
    --tag-intel-t: #ff9100;
    --tag-malware: #2e0000;
    --tag-malware-t: #ff5252;
    --tag-tools: #001a2e;
    --tag-tools-t: #40c4ff;
    --tag-privesc: #1a001a;
    --tag-privesc-t: #ea80fc;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'JetBrains Mono', monospace;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* === GRID BACKGROUND === */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(0,229,255,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,229,255,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  /* === HEADER === */
  header {
    position: relative;
    z-index: 10;
    padding: 48px 40px 32px;
    border-bottom: 1px solid var(--border);
    background: linear-gradient(180deg, rgba(0,229,255,0.05) 0%, transparent 100%);
  }

  .header-inner {
    max-width: 1200px;
    margin: 0 auto;
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 24px;
  }

  .logo-block {}

  .logo-tag {
    font-size: 11px;
    color: var(--accent);
    letter-spacing: 4px;
    text-transform: uppercase;
    margin-bottom: 8px;
    opacity: 0.7;
  }

  h1 {
    font-family: 'Syne', sans-serif;
    font-size: clamp(32px, 5vw, 56px);
    font-weight: 800;
    color: var(--text-bright);
    letter-spacing: -1px;
    line-height: 1;
  }

  h1 span {
    color: var(--accent);
  }

  .subtitle {
    margin-top: 10px;
    font-size: 13px;
    color: var(--text-dim);
    letter-spacing: 1px;
  }

  .stats {
    display: flex;
    gap: 32px;
    flex-wrap: wrap;
  }

  .stat {
    text-align: center;
  }

  .stat-num {
    font-family: 'Syne', sans-serif;
    font-size: 28px;
    font-weight: 800;
    color: var(--accent);
    display: block;
  }

  .stat-label {
    font-size: 10px;
    color: var(--text-dim);
    letter-spacing: 2px;
    text-transform: uppercase;
  }

  /* === CONTROLS === */
  .controls {
    position: relative;
    z-index: 10;
    max-width: 1200px;
    margin: 32px auto;
    padding: 0 40px;
    display: flex;
    flex-wrap: wrap;
    gap: 16px;
    align-items: center;
  }

  .search-wrapper {
    position: relative;
    flex: 1;
    min-width: 280px;
  }

  .search-icon {
    position: absolute;
    left: 16px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--accent);
    font-size: 16px;
    pointer-events: none;
  }

  #search {
    width: 100%;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 4px;
    color: var(--text-bright);
    font-family: 'JetBrains Mono', monospace;
    font-size: 14px;
    padding: 14px 16px 14px 44px;
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
  }

  #search::placeholder { color: var(--text-dim); }

  #search:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 2px rgba(0,229,255,0.1);
  }

  .filter-tags {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
  }

  .filter-btn {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 3px;
    color: var(--text-dim);
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    padding: 7px 14px;
    cursor: pointer;
    transition: all 0.15s;
    letter-spacing: 1px;
    text-transform: uppercase;
  }

  .filter-btn:hover { border-color: var(--accent); color: var(--accent); }
  .filter-btn.active { background: var(--accent); color: #000; border-color: var(--accent); font-weight: 600; }

  /* === MAIN GRID === */
  main {
    position: relative;
    z-index: 10;
    max-width: 1200px;
    margin: 0 auto;
    padding: 0 40px 80px;
  }

  .results-info {
    font-size: 11px;
    color: var(--text-dim);
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-bottom: 24px;
  }

  .results-info span { color: var(--accent); }

  /* === CATEGORY SECTION === */
  .category-section {
    margin-bottom: 48px;
  }

  .category-header {
    display: flex;
    align-items: center;
    gap: 16px;
    margin-bottom: 20px;
    padding-bottom: 12px;
    border-bottom: 1px solid var(--border);
  }

  .category-icon {
    font-size: 20px;
  }

  .category-title {
    font-family: 'Syne', sans-serif;
    font-size: 18px;
    font-weight: 700;
    color: var(--text-bright);
    letter-spacing: 1px;
  }

  .category-count {
    font-size: 11px;
    color: var(--text-dim);
    margin-left: auto;
  }

  .links-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
    gap: 12px;
  }

  /* === LINK CARD === */
  .link-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 16px 18px;
    transition: border-color 0.2s, transform 0.2s, box-shadow 0.2s;
    display: flex;
    flex-direction: column;
    gap: 8px;
    cursor: pointer;
    text-decoration: none;
    position: relative;
    overflow: hidden;
  }

  .link-card::before {
    content: '';
    position: absolute;
    left: 0; top: 0; bottom: 0;
    width: 3px;
    background: var(--card-accent, var(--accent));
    opacity: 0.6;
    transition: opacity 0.2s;
  }

  .link-card:hover {
    border-color: var(--card-accent, var(--accent));
    transform: translateY(-2px);
    box-shadow: 0 8px 24px rgba(0,0,0,0.4);
  }

  .link-card:hover::before { opacity: 1; }

  .card-title {
    font-size: 13px;
    font-weight: 600;
    color: var(--text-bright);
    line-height: 1.4;
  }

  .card-url {
    font-size: 11px;
    color: var(--text-dim);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .card-desc {
    font-size: 12px;
    color: var(--text);
    line-height: 1.5;
    opacity: 0.8;
  }

  .card-tag {
    display: inline-block;
    font-size: 10px;
    font-weight: 600;
    padding: 3px 8px;
    border-radius: 2px;
    letter-spacing: 1px;
    text-transform: uppercase;
    align-self: flex-start;
  }

  /* === NO RESULTS === */
  .no-results {
    text-align: center;
    padding: 80px 20px;
    color: var(--text-dim);
    display: none;
  }

  .no-results-icon { font-size: 48px; margin-bottom: 16px; }
  .no-results h3 { font-family: 'Syne', sans-serif; font-size: 20px; color: var(--text); margin-bottom: 8px; }

  /* === FOOTER === */
  footer {
    position: relative;
    z-index: 10;
    text-align: center;
    padding: 32px;
    border-top: 1px solid var(--border);
    font-size: 11px;
    color: var(--text-dim);
    letter-spacing: 2px;
  }

  /* === RESPONSIVE === */
  @media (max-width: 640px) {
    header, .controls, main { padding-left: 20px; padding-right: 20px; }
    .links-grid { grid-template-columns: 1fr; }
    .stats { gap: 20px; }
  }

  /* === SCAN LINE ANIM === */
  @keyframes scanline {
    0% { transform: translateY(-100%); }
    100% { transform: translateY(100vh); }
  }

  body::after {
    content: '';
    position: fixed;
    left: 0; top: 0;
    width: 100%;
    height: 2px;
    background: linear-gradient(90deg, transparent, rgba(0,229,255,0.3), transparent);
    animation: scanline 8s linear infinite;
    pointer-events: none;
    z-index: 1;
  }

  /* === FADE IN === */
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(16px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .category-section {
    animation: fadeUp 0.4s ease both;
  }

  .category-section:nth-child(2) { animation-delay: 0.05s; }
  .category-section:nth-child(3) { animation-delay: 0.10s; }
  .category-section:nth-child(4) { animation-delay: 0.15s; }
  .category-section:nth-child(5) { animation-delay: 0.20s; }
  .category-section:nth-child(6) { animation-delay: 0.25s; }
  .category-section:nth-child(7) { animation-delay: 0.30s; }
  .category-section:nth-child(8) { animation-delay: 0.35s; }
</style>
</head>

// === BUILD UI ===
let activeFilter = "all";

function getTagStyle(tag) {
  const map = {
    wiki:      { bg: "#1a3a4a", color: "#00e5ff" },
    blue:      { bg: "#0d2e1a", color: "#69ff47" },
    red:       { bg: "#2e0d1a", color: "#ff4081" },
    hunt:      { bg: "#2e2200", color: "#ffd740" },
    forensics: { bg: "#1a1040", color: "#b388ff" },
    linux:     { bg: "#1a2e00", color: "#76ff03" },
    windows:   { bg: "#002e2e", color: "#00e5ff" },
    intel:     { bg: "#2e1a00", color: "#ff9100" },
    malware:   { bg: "#2e0000", color: "#ff5252" },
    tools:     { bg: "#001a2e", color: "#40c4ff" },
    privesc:   { bg: "#1a001a", color: "#ea80fc" },
  };
  return map[tag] || { bg: "#1a1a1a", color: "#aaa" };
}

function getDomain(url) {
  try { return new URL(url).hostname.replace("www.", ""); }
  catch { return url; }
}

function buildFilters() {
  const tags = [...new Set(DATA.map(c => c.tag))];
  const container = document.getElementById("filter-tags");

  const allBtn = document.createElement("button");
  allBtn.className = "filter-btn active";
  allBtn.textContent = "Todos";
  allBtn.dataset.filter = "all";
  allBtn.onclick = () => setFilter("all");
  container.appendChild(allBtn);

  const tagLabels = {
    wiki: "Wiki", blue: "Blue Team", red: "Red Team", hunt: "Hunting",
    linux: "Linux", windows: "Windows", malware: "Malware", tools: "Ferramentas",
    privesc: "Priv Esc", intel: "Intel", forensics: "Forense"
  };

  tags.forEach(tag => {
    const btn = document.createElement("button");
    btn.className = "filter-btn";
    btn.textContent = tagLabels[tag] || tag;
    btn.dataset.filter = tag;
    btn.onclick = () => setFilter(tag);
    container.appendChild(btn);
  });
}

function setFilter(f) {
  activeFilter = f;
  document.querySelectorAll(".filter-btn").forEach(b => {
    b.classList.toggle("active", b.dataset.filter === f);
  });
  render();
}

function render() {
  const query = document.getElementById("search").value.toLowerCase().trim();
  const container = document.getElementById("grid-container");
  container.innerHTML = "";

  let totalVisible = 0;

  DATA.forEach(cat => {
    if (activeFilter !== "all" && cat.tag !== activeFilter) return;

    const filtered = cat.links.filter(link => {
      if (!query) return true;
      return (
        link.title.toLowerCase().includes(query) ||
        link.url.toLowerCase().includes(query) ||
        (link.desc && link.desc.toLowerCase().includes(query))
      );
    });

    if (filtered.length === 0) return;
    totalVisible += filtered.length;

    const section = document.createElement("div");
    section.className = "category-section";

    const tagStyle = getTagStyle(cat.tag);

    section.innerHTML = `
      <div class="category-header">
        <span class="category-icon">${cat.icon}</span>
        <span class="category-title">${cat.cat}</span>
        <span class="category-count">${filtered.length} link${filtered.length !== 1 ? "s" : ""}</span>
      </div>
      <div class="links-grid"></div>
    `;

    const grid = section.querySelector(".links-grid");

    filtered.forEach(link => {
      const card = document.createElement("a");
      card.className = "link-card";
      card.href = link.url;
      card.target = "_blank";
      card.rel = "noopener noreferrer";
      card.style.setProperty("--card-accent", cat.color);

      card.innerHTML = `
        <span class="card-tag" style="background:${tagStyle.bg};color:${tagStyle.color}">${cat.cat}</span>
        <span class="card-title">${highlight(link.title, query)}</span>
        <span class="card-url">${getDomain(link.url)}</span>
        ${link.desc ? `<span class="card-desc">${highlight(link.desc, query)}</span>` : ""}
      `;

      grid.appendChild(card);
    });

    container.appendChild(section);
  });

  // stats
  const totalLinks = DATA.reduce((a, c) => a + c.links.length, 0);
  document.getElementById("total-links").textContent = totalLinks;
  document.getElementById("total-cats").textContent = DATA.length;

  // results info
  const info = document.getElementById("results-info");
  if (query || activeFilter !== "all") {
    info.innerHTML = `Exibindo <span>${totalVisible}</span> links`;
  } else {
    info.innerHTML = `<span>${totalLinks}</span> links em <span>${DATA.length}</span> categorias`;
  }

  document.getElementById("no-results").style.display = totalVisible === 0 ? "block" : "none";
}

function highlight(text, query) {
  if (!query) return text;
  const escaped = query.replace(/[.*+?^${}()|[\]\\]/g, "\\$&");
  return text.replace(new RegExp(`(${escaped})`, "gi"), '<mark style="background:#ffd74033;color:#ffd740;border-radius:2px">$1</mark>');
}

// Init
buildFilters();
render();

document.getElementById("search").addEventListener("input", render);
</script>
